name: Build
permissions:
  contents: read

on: [push, pull_request]

jobs:
  buildtest:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Fetch deps
        run: make -f ci/Makefile --include-dir ci ci-deps
      - name: Do Build
        run: make -f ci/Makefile --include-dir ci ci-build
      - name: Run Tests
        run: make -f ci/Makefile --include-dir ci ci-test
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --disable errcheck
      - name: errcheck (non-blocking)
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          args: --enable-only errcheck
      - name: Run Linter
        run: make -f ci/Makefile --include-dir ci ci-lint

